name: Stream Health Check

on:
  workflow_dispatch:
    inputs:
      playlist:
        description: Playlist file to audit
        required: true
        default: M3U/M3UPT.m3u
      workers:
        description: Parallel stream checks
        required: true
        default: "32"
      timeout:
        description: Per-request timeout in seconds
        required: true
        default: "8"
  schedule:
    - cron: "17 */5 * * *"
  push:
    branches:
      - main
    paths:
      - M3U/**
      - scripts/audit_streams.py
      - scripts/compare_stream_health.py
      - scripts/apply_upstream_working_streams.py
      - .github/workflows/stream-health.yml
  pull_request:
    paths:
      - M3U/**
      - scripts/audit_streams.py
      - scripts/compare_stream_health.py
      - scripts/apply_upstream_working_streams.py
      - .github/workflows/stream-health.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: stream-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit IPTV streams
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PLAYLIST: ${{ inputs.playlist || 'M3U/M3UPT.m3u' }}
      WORKERS: ${{ inputs.workers || '32' }}
      REQUEST_TIMEOUT: ${{ inputs.timeout || '8' }}
      REPORT_DIR: reports/stream-health
      UPSTREAM_PLAYLIST_URL: https://raw.githubusercontent.com/LITUATUI/M3UPT/main/M3U/M3UPT.m3u

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PT_IPTV_AUTOMATION_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Audit this repository
        run: |
          mkdir -p "$REPORT_DIR/this-repo"
          python scripts/audit_streams.py \
            --playlist "$PLAYLIST" \
            --output-dir "$REPORT_DIR/this-repo" \
            --workers "$WORKERS" \
            --timeout "$REQUEST_TIMEOUT"

      - name: Download upstream LITUATUI playlist
        run: |
          curl --fail --location --silent --show-error \
            "$UPSTREAM_PLAYLIST_URL" \
            --output "$REPORT_DIR/lituatui-m3upt.m3u"

      - name: Audit upstream LITUATUI playlist without radios
        run: |
          mkdir -p "$REPORT_DIR/lituatui-m3upt"
          python scripts/audit_streams.py \
            --playlist "$REPORT_DIR/lituatui-m3upt.m3u" \
            --output-dir "$REPORT_DIR/lituatui-m3upt" \
            --workers "$WORKERS" \
            --timeout "$REQUEST_TIMEOUT" \
            --exclude-radio

      - name: Build combined comparison report
        run: |
          python scripts/compare_stream_health.py \
            --mine "$REPORT_DIR/this-repo/pt-iptv-channel-audit.csv" \
            --upstream "$REPORT_DIR/lituatui-m3upt/pt-iptv-channel-audit.csv" \
            --output-dir "$REPORT_DIR"

      - name: Apply working upstream stream fixes
        id: upstream_fixes
        if: github.event_name != 'pull_request'
        run: |
          python scripts/apply_upstream_working_streams.py \
            --local-playlist "$PLAYLIST" \
            --upstream-playlist "$REPORT_DIR/lituatui-m3upt.m3u" \
            --mine-audit "$REPORT_DIR/this-repo/pt-iptv-channel-audit.csv" \
            --upstream-audit "$REPORT_DIR/lituatui-m3upt/pt-iptv-channel-audit.csv" \
            --output-dir "$REPORT_DIR/upstream-auto-update"

      - name: Create or update upstream fixes PR
        if: github.event_name != 'pull_request' && steps.upstream_fixes.outputs.changed_count != '0'
        run: |
          set -euo pipefail

          branch="automation/apply-working-upstream-streams"
          title="Update streams from working upstream entries"
          body_file="$(mktemp)"

          cat > "$body_file" <<BODY
          Updates local stream URLs/options where the Stream Health Check found a matching upstream LITUATUI/M3UPT entry working while this repo's matching entry failed.

          Updated entries:
          ${CHANGED_NAMES}

          This PR was created automatically by the Stream Health Check workflow.
          BODY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add "$PLAYLIST"
          if git diff --cached --quiet; then
            echo "The upstream updater reported changes, but no playlist diff remains to commit."
            exit 0
          fi
          git commit -m "$title"
          git push --force --set-upstream origin "$branch"

          pr_number="$(gh pr list --state open --head "${GITHUB_REPOSITORY_OWNER}:${branch}" --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$title" --body-file "$body_file"
            pr_url="$(gh pr view "$pr_number" --json url --jq '.url')"
          else
            if ! pr_url="$(gh pr create --base main --head "$branch" --title "$title" --body-file "$body_file")"; then
              echo "::error title=Unable to create upstream fixes PR::The playlist update branch was pushed, but GitHub rejected PR creation. Enable 'Allow GitHub Actions to create and approve pull requests' for this repository, or add a PT_IPTV_AUTOMATION_TOKEN secret with contents and pull-requests write access."
              exit 1
            fi
          fi

          echo "Upstream fixes PR: $pr_url" >> "$GITHUB_STEP_SUMMARY"
          if gh pr merge "$pr_url" --auto --squash --delete-branch; then
            echo "Auto squash merge requested for $pr_url" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=Auto-merge not enabled::Created or updated $pr_url, but GitHub rejected the auto squash merge request. Check that auto-merge is enabled for the repository and that the workflow token has permission to manage pull requests."
            echo "Auto squash merge could not be enabled for $pr_url" >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          CHANGED_NAMES: ${{ steps.upstream_fixes.outputs.changed_names }}
          GH_TOKEN: ${{ secrets.PT_IPTV_AUTOMATION_TOKEN || github.token }}

      - name: Upload stream health report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: stream-health-report
          path: |
            reports/stream-health/**
          retention-days: 30
          if-no-files-found: error

      - name: Add report summary
        if: always()
        env:
          ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
          UPSTREAM_FIX_COUNT: ${{ steps.upstream_fixes.outputs.changed_count }}
        run: |
          report="$REPORT_DIR/pt-iptv-stream-health-report.md"
          if [ ! -f "$report" ]; then
            echo "No stream health report was generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          awk '/^## This Repo Detailed Failures/{exit} {print}' "$report" >> "$GITHUB_STEP_SUMMARY"
          {
            echo
            echo "## Full Report"
            echo
            echo "The full Markdown and CSV reports are attached to this run as the \`stream-health-report\` artifact."
            echo
            echo "Upstream auto-update candidates changed: ${UPSTREAM_FIX_COUNT:-not-run}"
            if [ -n "$ARTIFACT_URL" ]; then
              echo
              echo "[Open artifact]($ARTIFACT_URL)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
