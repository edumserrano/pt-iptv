<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PT IPTV Playlist Browser</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Cpath d='M18 20h28v24H18z' fill='white'/%3E%3Cpath d='M24 28h16v4H24zm0 8h10v4H24z' fill='%230f766e'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-soft: #f1f5f9;
      --text: #111827;
      --muted: #5f6b7a;
      --border: #d7dee8;
      --accent: #0f766e;
      --accent-strong: #0b5d56;
      --warn: #a16207;
      --bad: #b42318;
      --good: #047857;
      --code: #eef2f7;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, #edf4ff 0, rgba(237, 244, 255, 0) 320px),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    a {
      color: var(--accent-strong);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      min-height: 36px;
      padding: 7px 10px;
    }

    button:hover {
      border-color: #aeb9c8;
      background: #f8fafc;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button:disabled:hover {
      border-color: var(--border);
      background: var(--panel);
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    .shell {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 10px 0 18px;
    }

    .title {
      display: grid;
      gap: 4px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      max-width: 760px;
    }

    .link-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .published-link {
      display: inline-flex;
      align-items: stretch;
      max-width: 100%;
      min-width: 0;
    }

    .link-strip code {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 8px 0 0 8px;
      background: var(--code);
      color: #263244;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 34px;
      min-width: 34px;
      min-height: 32px;
      margin-left: -1px;
      padding: 0;
      border-radius: 0 8px 8px 0;
    }

    .icon-button svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-button.copied {
      border-color: var(--good);
      background: var(--good);
      color: #fff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .stat .value {
      display: block;
      margin-top: 4px;
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
    }

    .player {
      display: grid;
      grid-template-columns: minmax(280px, 1.25fr) minmax(260px, 0.75fr);
      gap: 14px;
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 14px;
    }

    .player-video-wrap {
      display: grid;
      align-items: center;
      min-width: 0;
      border-radius: 8px;
      background: #0f172a;
      overflow: hidden;
    }

    .player-video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 520px;
      background: #0f172a;
    }

    .player-info {
      display: grid;
      align-content: start;
      gap: 10px;
      min-width: 0;
    }

    .player-kicker {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .player-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .player-source {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .player-status {
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #f8fafc;
      color: var(--muted);
      padding: 10px;
      overflow-wrap: anywhere;
    }

    .player-status.good {
      border-color: rgba(4, 120, 87, 0.28);
      background: rgba(4, 120, 87, 0.08);
      color: var(--good);
    }

    .player-status.warn {
      border-color: rgba(161, 98, 7, 0.28);
      background: rgba(161, 98, 7, 0.08);
      color: var(--warn);
    }

    .player-status.bad {
      border-color: rgba(180, 35, 24, 0.28);
      background: rgba(180, 35, 24, 0.08);
      color: var(--bad);
    }

    .player-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 190px 160px 160px auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .filters input,
    .filters select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
    }

    .filters input:focus,
    .filters select:focus {
      outline: 2px solid rgba(15, 118, 110, 0.16);
      border-color: var(--accent);
    }

    .status {
      min-height: 42px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }

    .channel {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      min-width: 0;
    }

    .channel.active {
      border-color: rgba(15, 118, 110, 0.58);
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.14);
    }

    .logo {
      width: 54px;
      height: 54px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
      object-fit: contain;
      padding: 5px;
    }

    .logo.fallback {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 700;
      font-size: 18px;
    }

    .channel-main {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .channel-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .name {
      font-weight: 700;
      font-size: 16px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #364153;
      padding: 2px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.good {
      border-color: rgba(4, 120, 87, 0.28);
      background: rgba(4, 120, 87, 0.08);
      color: var(--good);
    }

    .badge.warn {
      border-color: rgba(161, 98, 7, 0.28);
      background: rgba(161, 98, 7, 0.08);
      color: var(--warn);
    }

    .description {
      color: #3b4658;
      min-height: 42px;
    }

    .meta {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .meta code {
      background: var(--code);
      border-radius: 6px;
      padding: 1px 5px;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .empty {
      border: 1px dashed #b8c4d3;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      padding: 28px;
      text-align: center;
    }

    .pass-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .pass-panel {
      width: min(420px, 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .pass-panel h1 {
      margin-bottom: 6px;
      font-size: 28px;
    }

    .pass-copy {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .pass-field {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    .pass-field input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
    }

    .pass-field input:focus {
      outline: 2px solid rgba(15, 118, 110, 0.16);
      border-color: var(--accent);
    }

    .pass-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .pass-error {
      min-height: 20px;
      margin-top: 12px;
      color: var(--bad);
      font-weight: 700;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 920px) {
      .topbar {
        flex-direction: column;
      }

      .link-strip {
        justify-content: flex-start;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
      }

      .player {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .filters button {
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100vw - 20px, 1480px);
        padding-top: 12px;
      }

      .stats,
      .filters,
      .grid {
        grid-template-columns: 1fr;
      }

      .channel {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .logo {
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <section class="pass-screen" id="pass-screen" aria-labelledby="pass-title">
    <form class="pass-panel" id="pass-form">
      <h1 id="pass-title">PT IPTV Playlist Browser</h1>
      <p class="pass-copy">Enter the pass to continue.</p>
      <label class="pass-field" for="pass-input">
        <span>Pass</span>
        <input id="pass-input" type="password" autocomplete="current-password" autofocus>
      </label>
      <div class="pass-actions">
        <button class="primary" type="submit">Unlock</button>
      </div>
      <div class="pass-error" id="pass-error" role="alert" aria-live="polite"></div>
    </form>
  </section>

  <main class="shell" id="app-shell" hidden>
    <section class="topbar" aria-labelledby="page-title">
      <div class="title">
        <h1 id="page-title">PT IPTV Playlist Browser</h1>
        <div class="subtitle" id="load-note">Loading the current playlist from this published site.</div>
      </div>
      <div class="link-strip" aria-label="Published links">
        <div class="published-link">
          <code id="playlist-link">playlist: p.m3u</code>
          <button class="icon-button" id="copy-playlist-link" type="button" aria-label="Copy playlist URL" title="Copy playlist URL">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="8" y="8" width="11" height="11" rx="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
        <div class="published-link">
          <code id="epg-link">epg: e.xml.xz</code>
          <button class="icon-button" id="copy-epg-link" type="button" aria-label="Copy EPG URL" title="Copy EPG URL">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="8" y="8" width="11" height="11" rx="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <section class="stats" aria-label="Playlist statistics">
      <div class="stat"><span class="label">Entries</span><span class="value" id="stat-total">0</span></div>
      <div class="stat"><span class="label">Playable URLs</span><span class="value" id="stat-playable">0</span></div>
      <div class="stat"><span class="label">Groups</span><span class="value" id="stat-groups">0</span></div>
      <div class="stat"><span class="label">Alternates</span><span class="value" id="stat-alts">0</span></div>
      <div class="stat"><span class="label">Missing URLs</span><span class="value" id="stat-missing">0</span></div>
    </section>

    <section class="player" id="player" aria-labelledby="player-title">
      <div class="player-video-wrap">
        <video class="player-video" id="player-video" controls playsinline preload="metadata"></video>
      </div>
      <div class="player-info">
        <div class="player-kicker">Web IPTV player</div>
        <h2 class="player-title" id="player-title">No channel selected</h2>
        <div class="player-source" id="player-source">Ready</div>
        <div class="player-status" id="player-status" role="status" aria-live="polite">Waiting for a stream.</div>
        <div class="player-actions">
          <button id="player-stop" type="button" disabled>Stop</button>
          <button id="player-copy" type="button" disabled>Copy URL</button>
          <a id="player-open" href="#" target="_blank" rel="noreferrer" hidden><button type="button">Open source</button></a>
        </div>
      </div>
    </section>

    <section class="filters" aria-label="Filters">
      <label class="sr-only" for="search">Search channels</label>
      <input id="search" type="search" autocomplete="off" placeholder="Search name, tvg-id, group, host, or description">

      <label class="sr-only" for="group-filter">Group</label>
      <select id="group-filter">
        <option value="">All groups</option>
      </select>

      <label class="sr-only" for="type-filter">Type</label>
      <select id="type-filter">
        <option value="">All entries</option>
        <option value="playable">Playable URL</option>
        <option value="missing">Missing URL</option>
        <option value="alternate">Alternates</option>
        <option value="media">On-demand media</option>
      </select>

      <label class="sr-only" for="sort-filter">Sort</label>
      <select id="sort-filter">
        <option value="playlist">Playlist order</option>
        <option value="name">Name</option>
        <option value="group">Group</option>
        <option value="host">Source host</option>
      </select>

      <button id="reset" type="button">Reset</button>
    </section>

    <div class="status" id="status" role="status"></div>
    <section class="grid" id="channels" aria-label="Playlist entries"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script>
    const accessHash = "9ed6918805ea2065dc19f92495bebdafbb8ad28293dc0b8b84897f86c6cdfb7e";

    const playlistCandidates = [
      "playlist.m3u",
      "p.m3u",
      "M3U/M3UPT.m3u",
      "../M3U/M3UPT.m3u"
    ];

    const state = {
      entries: [],
      filtered: [],
      playlistUrl: "",
      origin: location.origin === "null" ? "" : location.origin,
      activeIndex: null,
      currentUrl: ""
    };

    const el = {
      appShell: document.getElementById("app-shell"),
      passScreen: document.getElementById("pass-screen"),
      passForm: document.getElementById("pass-form"),
      passInput: document.getElementById("pass-input"),
      passError: document.getElementById("pass-error"),
      loadNote: document.getElementById("load-note"),
      playlistLink: document.getElementById("playlist-link"),
      epgLink: document.getElementById("epg-link"),
      copyPlaylistLink: document.getElementById("copy-playlist-link"),
      copyEpgLink: document.getElementById("copy-epg-link"),
      player: document.getElementById("player"),
      playerVideo: document.getElementById("player-video"),
      playerTitle: document.getElementById("player-title"),
      playerSource: document.getElementById("player-source"),
      playerStatus: document.getElementById("player-status"),
      playerStop: document.getElementById("player-stop"),
      playerCopy: document.getElementById("player-copy"),
      playerOpen: document.getElementById("player-open"),
      total: document.getElementById("stat-total"),
      playable: document.getElementById("stat-playable"),
      groups: document.getElementById("stat-groups"),
      alts: document.getElementById("stat-alts"),
      missing: document.getElementById("stat-missing"),
      search: document.getElementById("search"),
      group: document.getElementById("group-filter"),
      type: document.getElementById("type-filter"),
      sort: document.getElementById("sort-filter"),
      reset: document.getElementById("reset"),
      status: document.getElementById("status"),
      channels: document.getElementById("channels")
    };

    let initialized = false;
    let playerHls = null;
    let playerPlayToken = 0;
    let playerRecoveredMediaError = false;

    async function sha256(value) {
      const data = new TextEncoder().encode(value);
      const hash = await globalThis.crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash), (byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    async function verifyPass(value) {
      if (!globalThis.crypto?.subtle) {
        throw new Error("Pass check requires a secure browser context.");
      }
      return await sha256(value) === accessHash;
    }

    async function handlePassSubmit(event) {
      event.preventDefault();
      const button = el.passForm.querySelector("button[type='submit']");
      const pass = el.passInput.value;
      el.passError.textContent = "";
      button.disabled = true;

      try {
        if (await verifyPass(pass)) {
          showApp();
          return;
        }
        el.passError.textContent = "Pass not recognised.";
        el.passInput.select();
      } catch (error) {
        el.passError.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    }

    function showPassScreen() {
      el.appShell.hidden = true;
      el.passScreen.hidden = false;
      el.passInput.focus();
    }

    function showApp() {
      el.passScreen.hidden = true;
      el.appShell.hidden = false;
      if (!initialized) {
        initialized = true;
        init();
      }
    }

    function parseAttrs(line) {
      const attrs = {};
      const attrRe = /([\w-]+)="([^"]*)"/g;
      let match;
      while ((match = attrRe.exec(line)) !== null) {
        attrs[match[1]] = match[2];
      }
      return attrs;
    }

    function parsePlaylist(text) {
      const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/);
      const entries = [];
      let current = null;

      function finish() {
        if (!current) return;
        current.description = describeEntry(current);
        current.searchText = [
          current.name,
          current.group,
          current.tvgId,
          current.host,
          current.url,
          current.description
        ].join(" ").toLowerCase();
        entries.push(current);
        current = null;
      }

      lines.forEach((rawLine, lineIndex) => {
        const line = rawLine.trim();
        if (!line) return;

        if (line.startsWith("#EXTINF:")) {
          finish();
          const attrs = parseAttrs(line);
          const comma = line.lastIndexOf(",");
          const name = comma >= 0 ? line.slice(comma + 1).trim() : "Unnamed entry";
          current = {
            index: entries.length + 1,
            line: lineIndex + 1,
            name,
            group: attrs["group-title"] || "Ungrouped",
            tvgId: attrs["tvg-id"] || "",
            logo: attrs["tvg-logo"] || "",
            media: String(attrs.media || "").toLowerCase() === "true",
            radio: String(attrs.radio || "").toLowerCase() === "true",
            headers: [],
            url: "",
            host: "",
            isAlt: /\(\s*alt\b/i.test(name),
            attrs
          };
          return;
        }

        if (!current) return;

        if (line.startsWith("#EXTVLCOPT:")) {
          current.headers.push(line.replace("#EXTVLCOPT:", ""));
          return;
        }

        if (!line.startsWith("#") && !current.url) {
          current.url = line;
          current.host = hostFromUrl(line);
        }
      });

      finish();
      return entries;
    }

    function hostFromUrl(value) {
      if (!value) return "";
      try {
        const url = new URL(value.split("|")[0]);
        return url.hostname.replace(/^www\./, "");
      } catch {
        return "";
      }
    }

    function baseChannelName(name) {
      return name.replace(/\s+\(Alt\s+\d+\)\s*$/i, "").trim();
    }

    function describeEntry(entry) {
      const name = entry.name;
      const group = entry.group || "Ungrouped";
      const host = entry.host;
      const id = entry.tvgId;

      if (!entry.url) {
        return `No active URL is currently listed for ${name}. It is kept in the playlist as a placeholder or disabled entry.`;
      }

      if (entry.isAlt) {
        return `Alternative stream for ${baseChannelName(name)}, kept as a fallback under the same channel id${host ? ` from ${host}` : ""}.`;
      }

      if (entry.media) {
        return `On-demand media item in the ${group} collection${host ? `, served from ${host}` : ""}.`;
      }

      if (/beachcam/i.test(group) || /beachcam/i.test(name)) {
        return `Live beach or surf camera stream${host ? ` from ${host}` : ""}.`;
      }

      if (/^RTP/i.test(name) || /^RTP/i.test(id) || /rtp\.pt$/i.test(host)) {
        return `Portuguese RTP channel stream${host ? ` delivered from ${host}` : ""}.`;
      }

      if (/TVI|CNNPortugal|VPlusTVI/i.test(id) || /iol\.pt$/i.test(host)) {
        return `Media Capital/IOL live stream with tokens refreshed by the repository workflow.`;
      }

      if (/SIC/i.test(id) || /sic|impresa|kaltura/i.test(host)) {
        return `SIC or Impresa-family stream using the playlist metadata and provider CDN.`;
      }

      if (/France|BFM|TV5|LEquipe/i.test(id + " " + name)) {
        return `French-language TV channel entry${host ? ` served from ${host}` : ""}.`;
      }

      if (/News|Noticias|Not[ií]cias/i.test(group + " " + name + " " + id)) {
        return `News channel stream${host ? ` from ${host}` : ""}.`;
      }

      if (/Sports?|Desporto/i.test(group + " " + name)) {
        return `Sports channel entry${host ? ` from ${host}` : ""}.`;
      }

      if (/youtube|youtu\.be/i.test(host)) {
        return `Video or live stream hosted on YouTube.`;
      }

      if (/githubusercontent|github\.com/i.test(host)) {
        return `Playlist sidecar or mirrored M3U hosted on GitHub.`;
      }

      if (/cloudfront|akamai|akamaized|fastly|amagi|cdn|hls/i.test(host)) {
        return `CDN-backed live stream${host ? ` from ${host}` : ""}.`;
      }

      return `${group} playlist entry${host ? ` served from ${host}` : ""}.`;
    }

    async function loadPlaylist() {
      let lastError = "";
      for (const candidate of playlistCandidates) {
        try {
          const response = await fetch(candidate, { cache: "no-store" });
          if (!response.ok) {
            lastError = `${candidate}: HTTP ${response.status}`;
            continue;
          }
          const text = await response.text();
          state.playlistUrl = new URL(candidate, location.href).href;
          state.entries = parsePlaylist(text);
          return;
        } catch (error) {
          lastError = `${candidate}: ${error.message}`;
        }
      }
      throw new Error(lastError || "Could not load playlist");
    }

    function setPublishedLinks() {
      const base = location.href.replace(/\/[^/]*$/, "/");
      const playlist = new URL("p.m3u", base).href;
      const epg = new URL("e.xml.xz", base).href;
      el.playlistLink.textContent = `playlist: ${playlist}`;
      el.epgLink.textContent = `epg: ${epg}`;
      el.playlistLink.title = playlist;
      el.epgLink.title = epg;
      el.copyPlaylistLink.dataset.copyValue = playlist;
      el.copyEpgLink.dataset.copyValue = epg;
    }

    function updateStats() {
      const entries = state.entries;
      const groups = new Set(entries.map((entry) => entry.group).filter(Boolean));
      el.total.textContent = entries.length.toLocaleString();
      el.playable.textContent = entries.filter((entry) => entry.url).length.toLocaleString();
      el.groups.textContent = groups.size.toLocaleString();
      el.alts.textContent = entries.filter((entry) => entry.isAlt).length.toLocaleString();
      el.missing.textContent = entries.filter((entry) => !entry.url).length.toLocaleString();
    }

    function populateGroupFilter() {
      const groups = [...new Set(state.entries.map((entry) => entry.group || "Ungrouped"))]
        .sort((a, b) => a.localeCompare(b));
      for (const group of groups) {
        const option = document.createElement("option");
        option.value = group;
        option.textContent = group;
        el.group.append(option);
      }
    }

    function applyFilters() {
      const query = el.search.value.trim().toLowerCase();
      const group = el.group.value;
      const type = el.type.value;
      const sort = el.sort.value;

      let rows = state.entries.filter((entry) => {
        if (query && !entry.searchText.includes(query)) return false;
        if (group && entry.group !== group) return false;
        if (type === "playable" && !entry.url) return false;
        if (type === "missing" && entry.url) return false;
        if (type === "alternate" && !entry.isAlt) return false;
        if (type === "media" && !entry.media) return false;
        return true;
      });

      rows = [...rows].sort((a, b) => {
        if (sort === "name") return a.name.localeCompare(b.name) || a.index - b.index;
        if (sort === "group") return a.group.localeCompare(b.group) || a.name.localeCompare(b.name);
        if (sort === "host") return a.host.localeCompare(b.host) || a.name.localeCompare(b.name);
        return a.index - b.index;
      });

      state.filtered = rows;
      render();
    }

    function badge(text, className = "") {
      const span = document.createElement("span");
      span.className = `badge ${className}`.trim();
      span.textContent = text;
      return span;
    }

    function createLogo(entry) {
      if (entry.logo) {
        const img = document.createElement("img");
        img.className = "logo";
        img.alt = "";
        img.loading = "lazy";
        img.src = entry.logo;
        img.onerror = () => {
          const fallback = logoFallback(entry);
          img.replaceWith(fallback);
        };
        return img;
      }
      return logoFallback(entry);
    }

    function logoFallback(entry) {
      const div = document.createElement("div");
      div.className = "logo fallback";
      const initials = entry.name
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0])
        .join("")
        .toUpperCase() || "?";
      div.textContent = initials;
      return div;
    }

    function showCopied(button) {
      if (button.classList.contains("icon-button")) {
        const originalLabel = button.getAttribute("aria-label");
        const originalTitle = button.getAttribute("title");
        button.classList.add("copied");
        button.setAttribute("aria-label", "Copied");
        button.title = "Copied";
        window.setTimeout(() => {
          button.classList.remove("copied");
          button.setAttribute("aria-label", originalLabel);
          button.title = originalTitle;
        }, 900);
        return;
      }

      const original = button.textContent;
      button.textContent = "Copied";
      window.setTimeout(() => {
        button.textContent = original;
      }, 900);
    }

    function copyText(value, button) {
      if (!value) return;
      const write = navigator.clipboard?.writeText
        ? navigator.clipboard.writeText(value)
        : Promise.reject(new Error("Clipboard API unavailable"));
      write.then(() => {
        showCopied(button);
      }).catch(() => {
        window.prompt("Copy this value", value);
      });
    }

    function cleanStreamUrl(value) {
      const raw = String(value || "").split("|")[0].trim();
      if (!raw) return "";
      try {
        return new URL(raw, state.playlistUrl || location.href).href;
      } catch {
        return raw;
      }
    }

    function isHlsUrl(url) {
      return /\.m3u8(?:$|[?#])/i.test(url);
    }

    function isPlainM3uUrl(url) {
      return /\.m3u(?:$|[?#])/i.test(url) && !isHlsUrl(url);
    }

    function streamHost(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, "");
      } catch {
        return "unknown source";
      }
    }

    function canPlayNativeHls() {
      return Boolean(
        el.playerVideo.canPlayType("application/vnd.apple.mpegurl") ||
        el.playerVideo.canPlayType("application/x-mpegURL")
      );
    }

    function setPlayerStatus(message, kind = "") {
      el.playerStatus.className = `player-status ${kind}`.trim();
      el.playerStatus.textContent = message;
    }

    function setPlayerDetails(entry, url) {
      el.playerTitle.textContent = entry.name;
      el.playerSource.textContent = `${entry.group || "Ungrouped"} - ${streamHost(url)}`;
      el.playerOpen.href = url;
      el.playerOpen.hidden = false;
      el.playerCopy.disabled = false;
      el.playerStop.disabled = false;
      if (entry.logo) {
        el.playerVideo.poster = entry.logo;
      } else {
        el.playerVideo.removeAttribute("poster");
      }
    }

    function destroyPlayerHls() {
      if (playerHls) {
        playerHls.destroy();
        playerHls = null;
      }
    }

    function resetPlayerVideo(clearPoster = true) {
      el.playerVideo.pause();
      el.playerVideo.removeAttribute("src");
      if (clearPoster) {
        el.playerVideo.removeAttribute("poster");
      }
      el.playerVideo.load();
    }

    function stopPlayback() {
      playerPlayToken += 1;
      destroyPlayerHls();
      state.activeIndex = null;
      state.currentUrl = "";
      resetPlayerVideo();
      el.playerTitle.textContent = "No channel selected";
      el.playerSource.textContent = "Ready";
      el.playerOpen.hidden = true;
      el.playerOpen.removeAttribute("href");
      el.playerCopy.disabled = true;
      el.playerStop.disabled = true;
      setPlayerStatus("Playback stopped.", "warn");
      updateActiveChannel();
    }

    function updateActiveChannel() {
      el.channels.querySelectorAll(".channel").forEach((card) => {
        card.classList.toggle("active", Number(card.dataset.entryIndex) === state.activeIndex);
      });
    }

    function explainPreflightIssue(url) {
      let parsed;
      try {
        parsed = new URL(url);
      } catch {
        return "This entry does not contain a valid URL, so the browser cannot load it.";
      }

      if (!/^https?:$/.test(parsed.protocol)) {
        return `This stream uses the ${parsed.protocol.replace(":", "")} protocol, which the web player cannot load.`;
      }

      if (location.protocol === "https:" && parsed.protocol === "http:") {
        return "This stream uses HTTP while the page is HTTPS, so the browser is likely blocking it as mixed content. It may still work in an IPTV app.";
      }

      if (/youtube\.com|youtu\.be|vimeo\.com/i.test(parsed.hostname)) {
        return "This looks like a video webpage URL rather than a direct media stream. The browser video player needs a direct HLS or media file URL.";
      }

      if (isPlainM3uUrl(url)) {
        return "This points to another M3U playlist, not a direct HLS media stream. Open or copy it into an IPTV app instead.";
      }

      return "";
    }

    function explainMediaElementError() {
      const error = el.playerVideo.error;
      if (!error) {
        return "The browser reported a playback failure but did not expose a media error code.";
      }

      if (error.code === 1) {
        return "Playback was aborted by the browser or by a new stream selection.";
      }

      if (error.code === 2) {
        return "The browser lost access to the stream while loading it. CORS, token expiry, geoblocking, or network blocking are common causes.";
      }

      if (error.code === 3) {
        return "The browser received media data but could not decode it. The stream may use an unsupported codec or malformed segments.";
      }

      if (error.code === 4) {
        return "The browser does not support this stream source or the server did not provide a playable media response.";
      }

      return "The browser could not play this stream, but it did not provide a specific reason.";
    }

    function explainHlsError(data) {
      const responseCode = data?.response?.code;
      const responseText = data?.response?.text;
      const status = responseCode ? ` The server returned HTTP ${responseCode}${responseText ? ` (${responseText})` : ""}.` : "";
      const details = data?.details || "";

      if (/manifestLoad/i.test(details)) {
        return `The HLS manifest could not be loaded.${status} This is often CORS, token expiry, geoblocking, or the provider blocking hotlinks.`;
      }

      if (/manifestParsing/i.test(details)) {
        return `The URL loaded, but it was not a valid HLS manifest.${status} The server may be returning HTML, an error page, or an expired token response.`;
      }

      if (/levelLoad|fragLoad/i.test(details)) {
        return `The HLS manifest loaded, but one or more video segments could not be fetched.${status} Segment CORS rules, expired tokens, or provider restrictions are likely.`;
      }

      if (/keyLoad/i.test(details)) {
        return `The stream appears encrypted and the browser could not load the decryption key.${status}`;
      }

      if (/buffer|append|stalled/i.test(details)) {
        return "The stream reached the browser but could not be buffered or decoded cleanly. Unsupported codecs or malformed HLS segments are likely.";
      }

      if (data?.type === globalThis.Hls?.ErrorTypes?.NETWORK_ERROR) {
        return `The browser could not fetch part of the HLS stream.${status} CORS, network blocking, token expiry, or geoblocking are likely.`;
      }

      if (data?.type === globalThis.Hls?.ErrorTypes?.MEDIA_ERROR) {
        return "The browser hit a media decode or buffer error while playing this HLS stream.";
      }

      return `HLS playback failed${details ? ` at ${details}` : ""}.${status}`;
    }

    async function probeStreamUrl(url, token, context, baseMessage) {
      if (!/^https?:\/\//i.test(url)) return;

      try {
        const response = await fetch(url, {
          method: context === "hls" ? "GET" : "HEAD",
          cache: "no-store"
        });
        if (token !== playerPlayToken || state.currentUrl !== url) return;

        const contentType = response.headers.get("content-type") || "unknown content type";
        if (!response.ok) {
          setPlayerStatus(`${baseMessage} The browser can reach the URL, but the server answered HTTP ${response.status}.`, "bad");
          return;
        }

        if (context === "hls" && !/mpegurl|vnd\.apple|text\/plain|application\/octet-stream/i.test(contentType)) {
          setPlayerStatus(`${baseMessage} A follow-up fetch succeeded, but the response was ${contentType}, not an HLS playlist.`, "bad");
          return;
        }

        setPlayerStatus(`${baseMessage} A follow-up fetch succeeded (${contentType}), so the remaining likely causes are codec support, segment-level CORS, encryption, or provider playback policy.`, "bad");
      } catch (error) {
        if (token !== playerPlayToken || state.currentUrl !== url) return;
        setPlayerStatus(`${baseMessage} A follow-up browser fetch also failed (${error.name}). That usually points to CORS, network blocking, mixed content, an expired token, or the provider rejecting GitHub Pages.`, "bad");
      }
    }

    function handleVideoError() {
      const url = state.currentUrl;
      if (!url) return;
      const token = playerPlayToken;
      const context = isHlsUrl(url) ? "hls" : "direct";
      const message = explainMediaElementError();
      setPlayerStatus(`${message} Checking what the browser can see...`, "bad");
      probeStreamUrl(url, token, context, message);
    }

    function handleHlsError(data, token, url) {
      if (token !== playerPlayToken || state.currentUrl !== url || !data?.fatal) return;

      if (data.type === globalThis.Hls?.ErrorTypes?.MEDIA_ERROR && !playerRecoveredMediaError && playerHls) {
        playerRecoveredMediaError = true;
        setPlayerStatus("The HLS stream hit a media error. Trying one browser-side recovery.", "warn");
        playerHls.recoverMediaError();
        return;
      }

      const message = explainHlsError(data);
      setPlayerStatus(`${message} Checking what the browser can see...`, "bad");
      probeStreamUrl(url, token, "hls", message);
    }

    function attemptPlayerPlay(token) {
      const playPromise = el.playerVideo.play();
      if (!playPromise?.catch) return;

      playPromise.catch((error) => {
        if (token !== playerPlayToken || !state.currentUrl) return;
        setPlayerStatus(`The stream loaded, but autoplay did not start (${error.name}). Use the video controls to start playback.`, "warn");
      });
    }

    function playEntry(entry) {
      if (!entry.url) return;

      const url = cleanStreamUrl(entry.url);
      const token = playerPlayToken + 1;
      playerPlayToken = token;
      playerRecoveredMediaError = false;
      destroyPlayerHls();
      state.currentUrl = "";
      resetPlayerVideo(false);

      state.activeIndex = entry.index;
      state.currentUrl = url;
      setPlayerDetails(entry, url);
      updateActiveChannel();
      el.player.scrollIntoView({ block: "start", behavior: "smooth" });

      const preflightIssue = explainPreflightIssue(url);
      if (preflightIssue) {
        setPlayerStatus(preflightIssue, "bad");
        return;
      }

      const Hls = globalThis.Hls;
      if (isHlsUrl(url)) {
        if (canPlayNativeHls()) {
          setPlayerStatus(`Loading native HLS from ${streamHost(url)}.`, "warn");
          el.playerVideo.src = url;
          el.playerVideo.load();
          attemptPlayerPlay(token);
          return;
        }

        if (Hls?.isSupported()) {
          setPlayerStatus(`Loading HLS from ${streamHost(url)}.`, "warn");
          playerHls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 90
          });
          playerHls.on(Hls.Events.MANIFEST_PARSED, () => {
            if (token !== playerPlayToken || state.currentUrl !== url) return;
            setPlayerStatus("HLS manifest loaded. Starting playback.", "good");
            attemptPlayerPlay(token);
          });
          playerHls.on(Hls.Events.ERROR, (_event, data) => handleHlsError(data, token, url));
          playerHls.loadSource(url);
          playerHls.attachMedia(el.playerVideo);
          return;
        }

        setPlayerStatus("This browser cannot play HLS streams here because native HLS and HLS.js MediaSource support are unavailable.", "bad");
        return;
      }

      setPlayerStatus(`Loading direct media from ${streamHost(url)}.`, "warn");
      el.playerVideo.src = url;
      el.playerVideo.load();
      attemptPlayerPlay(token);
    }

    function render() {
      const rows = state.filtered;
      el.status.textContent = `${rows.length.toLocaleString()} entries shown from ${state.entries.length.toLocaleString()} total. Source: ${state.playlistUrl || "not loaded"}`;
      el.channels.textContent = "";

      if (!rows.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No entries match the current filters.";
        el.channels.append(empty);
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const entry of rows) {
        const card = document.createElement("article");
        card.className = "channel";
        card.dataset.entryIndex = String(entry.index);
        card.append(createLogo(entry));

        const main = document.createElement("div");
        main.className = "channel-main";

        const title = document.createElement("div");
        title.className = "channel-title";
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = entry.name;
        title.append(name);
        title.append(badge(`#${entry.index}`));
        main.append(title);

        const badges = document.createElement("div");
        badges.className = "badges";
        badges.append(badge(entry.url ? "playable URL" : "missing URL", entry.url ? "good" : "warn"));
        if (entry.isAlt) badges.append(badge("alternate", "good"));
        if (entry.media) badges.append(badge("media"));
        if (entry.radio) badges.append(badge("radio"));
        badges.append(badge(entry.group || "Ungrouped"));
        main.append(badges);

        const description = document.createElement("div");
        description.className = "description";
        description.textContent = entry.description;
        main.append(description);

        const meta = document.createElement("div");
        meta.className = "meta";
        const tvg = document.createElement("div");
        tvg.innerHTML = `tvg-id: <code>${escapeHtml(entry.tvgId || "none")}</code>`;
        const host = document.createElement("div");
        host.innerHTML = `source: <code>${escapeHtml(entry.host || "none")}</code>`;
        meta.append(tvg, host);
        main.append(meta);

        const actions = document.createElement("div");
        actions.className = "actions";
        if (entry.url) {
          const play = document.createElement("button");
          play.type = "button";
          play.className = "primary";
          play.textContent = "Play";
          play.addEventListener("click", () => playEntry(entry));
          actions.append(play);

          const open = document.createElement("a");
          open.href = entry.url;
          open.target = "_blank";
          open.rel = "noreferrer";
          const openButton = document.createElement("button");
          openButton.type = "button";
          openButton.textContent = "Open";
          open.append(openButton);
          actions.append(open);

          const copy = document.createElement("button");
          copy.type = "button";
          copy.textContent = "Copy URL";
          copy.addEventListener("click", () => copyText(entry.url, copy));
          actions.append(copy);
        }

        const copyInfo = document.createElement("button");
        copyInfo.type = "button";
        copyInfo.textContent = "Copy Info";
        copyInfo.addEventListener("click", () => copyText([
          entry.name,
          `tvg-id: ${entry.tvgId || "none"}`,
          `group: ${entry.group}`,
          `url: ${entry.url || "none"}`,
          `description: ${entry.description}`
        ].join("\n"), copyInfo));
        actions.append(copyInfo);
        main.append(actions);

        card.append(main);
        fragment.append(card);
      }
      el.channels.append(fragment);
      updateActiveChannel();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function bindEvents() {
      [el.search, el.group, el.type, el.sort].forEach((input) => {
        input.addEventListener("input", applyFilters);
      });
      el.reset.addEventListener("click", () => {
        el.search.value = "";
        el.group.value = "";
        el.type.value = "";
        el.sort.value = "playlist";
        applyFilters();
      });
      el.copyPlaylistLink.addEventListener("click", () => {
        copyText(el.copyPlaylistLink.dataset.copyValue, el.copyPlaylistLink);
      });
      el.copyEpgLink.addEventListener("click", () => {
        copyText(el.copyEpgLink.dataset.copyValue, el.copyEpgLink);
      });
      el.playerStop.addEventListener("click", stopPlayback);
      el.playerCopy.addEventListener("click", () => {
        copyText(state.currentUrl, el.playerCopy);
      });
      el.playerVideo.addEventListener("error", handleVideoError);
      el.playerVideo.addEventListener("playing", () => {
        if (!state.currentUrl) return;
        setPlayerStatus("Playing.", "good");
      });
      el.playerVideo.addEventListener("waiting", () => {
        if (!state.currentUrl) return;
        setPlayerStatus("The stream is buffering.", "warn");
      });
      el.playerVideo.addEventListener("stalled", () => {
        if (!state.currentUrl) return;
        setPlayerStatus("The stream stalled while loading. The provider may be slow, blocking segments, or limiting this connection.", "warn");
      });
    }

    async function init() {
      setPublishedLinks();
      bindEvents();
      try {
        await loadPlaylist();
        el.loadNote.textContent = `Loaded ${state.entries.length.toLocaleString()} entries from ${state.playlistUrl}.`;
        updateStats();
        populateGroupFilter();
        applyFilters();
      } catch (error) {
        el.loadNote.textContent = "Could not load the playlist automatically.";
        el.status.textContent = error.message;
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Open this page from GitHub Pages, or serve the repository over HTTP so the browser can fetch the M3U file.";
        el.channels.append(empty);
      }
    }

    function start() {
      el.passForm.addEventListener("submit", handlePassSubmit);
      showPassScreen();
    }

    start();
  </script>
</body>
</html>
